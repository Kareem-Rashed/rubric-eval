<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubric — rubric-eval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090b;
      --surface:   #111115;
      --surface2:  #17171c;
      --surface3:  #1d1d24;
      --border:    #232329;
      --border2:   #2c2c35;
      --text:      #e8e8f0;
      --text2:     #8888a0;
      --muted:     #50505f;
      --acc:       #f97316;
      --green:     #22c55e;
      --red:       #f43f5e;
      --blue:      #38bdf8;
      --slate:     #94a3b8;
      --radius:    8px;
      --radius-lg: 12px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--acc);
    }
    .header-divider { width: 1px; height: 22px; background: var(--border2); }
    .header-subtitle { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.3px; }
    .header-right { display: flex; align-items: center; gap: 18px; }
    .header-run-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .header-date { font-size: 0.73rem; color: var(--muted); }
    .header-duration {
      font-size: 0.71rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.2);
      color: var(--acc);
    }

    /* ── Layout ── */
    .main { max-width: 1280px; margin: 0 auto; padding: 32px 40px 80px; }

    /* ── Stat Cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 1px 1px 0 0;
    }
    .stat-card.pass-rate::after { background: var(--acc); }
    .stat-card.avg-score::after { background: var(--slate); }
    .stat-card.s-passed::after  { background: var(--green); }
    .stat-card.s-failed::after  { background: var(--red); }
    .stat-card.s-total::after   { background: var(--muted); }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 5px;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }
    .stat-card.pass-rate .stat-value { color: var(--acc); }
    .stat-card.avg-score .stat-value { color: var(--slate); }
    .stat-card.s-passed  .stat-value { color: var(--green); }
    .stat-card.s-failed  .stat-value { color: var(--red); }
    .stat-card.s-total   .stat-value { color: var(--text2); }
    .stat-label {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted);
    }

    /* ── Overview Row ── */
    .overview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    @media (max-width: 700px) { .overview-row { grid-template-columns: 1fr; } }

    /* ── Donut Chart ── */
    .donut-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .donut-wrap { position: relative; flex-shrink: 0; }
    .donut-svg { width: 108px; height: 108px; transform: rotate(-90deg); }
    .donut-bg   { fill: none; stroke: var(--border2); stroke-width: 13; }
    .donut-pass { fill: none; stroke: var(--green); stroke-width: 13; stroke-linecap: round; transition: stroke-dasharray 1s cubic-bezier(0.4,0,0.2,1); }
    .donut-fail { fill: none; stroke: var(--red);   stroke-width: 13; stroke-linecap: round; transition: stroke-dasharray 1s cubic-bezier(0.4,0,0.2,1); }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .donut-pct { font-size: 1.15rem; font-weight: 600; color: var(--text); line-height: 1; }
    .donut-sub { font-size: 0.56rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 3px; }
    .donut-legend { flex: 1; }
    .donut-legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.81rem; }
    .donut-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .donut-legend-label { color: var(--text2); }
    .donut-legend-count { margin-left: auto; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── Per-metric bar chart ── */
    .metric-chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      overflow: hidden;
    }
    .chart-title {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .metric-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .metric-bar-row:last-child { margin-bottom: 0; }
    .metric-bar-name {
      width: 140px;
      flex-shrink: 0;
      font-size: 0.78rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-bar-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .metric-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }
    .metric-bar-pct {
      width: 44px;
      text-align: right;
      font-size: 0.78rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── Section headers ── */
    .section-header {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 26px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Metrics table ── */
    .metrics-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .metrics-table { width: 100%; border-collapse: collapse; }
    .metrics-table th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .metrics-table td { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .metrics-table tr:last-child td { border-bottom: none; }
    .metrics-table tbody tr:hover td { background: var(--surface2); }
    .mbar-wrap { display: flex; align-items: center; gap: 10px; }
    .mbar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; max-width: 180px; }
    .mbar-fill { height: 100%; border-radius: 3px; }

    /* ── Search + filter ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 12px 7px 32px;
      font-size: 0.81rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--acc); }
    .search-icon {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .filter-label {
      font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted);
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--border2); color: var(--text2); }
    .filter-btn.active      { background: rgba(249,115,22,0.1); border-color: var(--acc); color: var(--acc); }
    .filter-btn.active-pass { background: rgba(34,197,94,0.1);  border-color: var(--green); color: var(--green); }
    .filter-btn.active-fail { background: rgba(244,63,94,0.1);  border-color: var(--red);   color: var(--red); }
    .filter-count { margin-left: auto; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    /* ── Results table ── */
    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .results-table .data-row td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .results-table .data-row:last-of-type td { border-bottom: none; }
    .results-table .data-row:hover td { background: var(--surface2); cursor: pointer; }
    .results-table .data-row.is-expanded td { background: var(--surface2); border-bottom-color: transparent; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 4px;
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.6px;
      white-space: nowrap; font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .badge-pass  { background: rgba(34,197,94,0.1);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .badge-fail  { background: rgba(244,63,94,0.1);  color: var(--red);   border: 1px solid rgba(244,63,94,0.2); }
    .badge-agent { background: rgba(56,189,248,0.08); color: var(--blue); border: 1px solid rgba(56,189,248,0.18); font-size: 0.62rem; }

    .test-name {
      font-weight: 500; color: var(--text);
      max-width: 340px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .test-sub {
      font-size: 0.71rem; color: var(--muted); margin-top: 2px;
      max-width: 340px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .score-cell { display: flex; align-items: center; gap: 8px; min-width: 130px; }
    .score-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 3px; }
    .score-num {
      font-weight: 700; font-size: 0.81rem; min-width: 40px;
      text-align: right; font-variant-numeric: tabular-nums;
    }
    .metric-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .mpill {
      font-size: 0.65rem; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .mpill-pass { background: rgba(34,197,94,0.08);  color: #16a34a; }
    .mpill-fail { background: rgba(244,63,94,0.08);  color: #e11d48; }
    .expand-btn {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.6rem;
      transition: all 0.2s; cursor: pointer; flex-shrink: 0;
    }
    .is-expanded .expand-btn {
      transform: rotate(180deg);
      background: rgba(249,115,22,0.12);
      border-color: var(--acc);
      color: var(--acc);
    }

    /* ── Detail panel ── */
    .detail-row td {
      padding: 0 !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .detail-inner {
      display: none;
      padding: 20px 20px 24px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .detail-inner.open { display: block; }

    .detail-tabs {
      display: flex; gap: 2px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .dtab {
      padding: 7px 14px;
      font-size: 0.75rem; font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      margin-bottom: -1px;
    }
    .dtab:hover { color: var(--text2); }
    .dtab.active { color: var(--acc); border-bottom-color: var(--acc); }

    .dtab-panel { display: none; }
    .dtab-panel.active { display: block; }

    /* IO boxes */
    .io-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .io-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .io-label {
      font-size: 0.61rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted);
      padding: 7px 12px 6px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .io-content {
      font-size: 0.79rem; color: #c4c4d8;
      white-space: pre-wrap; word-break: break-word;
      max-height: 180px; overflow-y: auto;
      line-height: 1.55; padding: 10px 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    .io-empty { color: var(--muted); font-style: italic; }

    /* Metric breakdown */
    .metric-breakdown {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .breakdown-header {
      padding: 8px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.61rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
    }
    .breakdown-row {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 100px 52px 60px;
      align-items: center;
      gap: 10px;
      font-size: 0.81rem;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .bd-name { color: var(--text); }
    .bd-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .bd-bar-fill { height: 100%; border-radius: 2px; }
    .bd-score { font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
    .bd-reason {
      grid-column: 1 / -1;
      font-size: 0.74rem; color: var(--muted);
      font-style: italic; padding: 0 0 2px;
      display: none;
    }
    .breakdown-row.has-reason .bd-reason { display: block; }
    .breakdown-row.has-reason { grid-template-rows: auto auto; }

    /* ── Agent meta strip ── */
    .agent-strip {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 14px;
    }
    .agent-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 11px;
      font-size: 0.77rem;
    }
    .agent-chip-label { color: var(--muted); font-size: 0.71rem; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
    .agent-chip-value { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

    /* ── Trace Tree — the differentiator ── */
    .trace-tree { position: relative; padding-left: 26px; }
    .trace-tree::before {
      content: '';
      position: absolute;
      left: 11px; top: 22px; bottom: 22px;
      width: 2px;
      background: linear-gradient(180deg, var(--acc) 0%, var(--border2) 100%);
      border-radius: 1px;
    }
    .trace-step {
      position: relative;
      margin-bottom: 8px;
    }
    .trace-step:last-child { margin-bottom: 0; }
    .trace-dot {
      position: absolute;
      left: -19px; top: 14px;
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      z-index: 1;
    }
    .step-thought     .trace-dot { background: var(--slate); }
    .step-tool_call   .trace-dot { background: var(--acc); }
    .step-observation .trace-dot { background: var(--blue); }
    .step-llm_call    .trace-dot { background: var(--blue); }
    .step-default     .trace-dot { background: var(--muted); }

    .trace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .step-thought     .trace-card { border-left: 3px solid var(--slate); }
    .step-tool_call   .trace-card { border-left: 3px solid var(--acc); }
    .step-observation .trace-card { border-left: 3px solid var(--blue); }
    .step-llm_call    .trace-card { border-left: 3px solid var(--blue); }

    .trace-card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .trace-type-badge {
      font-size: 0.63rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 2px 7px; border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      flex-shrink: 0;
    }
    .step-thought     .trace-type-badge { background: rgba(148,163,184,0.12); color: var(--slate); }
    .step-tool_call   .trace-type-badge { background: rgba(249,115,22,0.12);  color: var(--acc); }
    .step-observation .trace-type-badge { background: rgba(56,189,248,0.1);   color: var(--blue); }
    .step-llm_call    .trace-type-badge { background: rgba(56,189,248,0.1);   color: var(--blue); }
    .step-default     .trace-type-badge { background: rgba(80,80,95,0.15);    color: var(--muted); }

    .trace-step-num { font-size: 0.67rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; flex-shrink: 0; }
    .trace-preview-text {
      font-size: 0.78rem; color: var(--text2);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-left: 6px;
    }
    .trace-latency {
      margin-left: auto;
      font-size: 0.67rem; font-weight: 600;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .trace-expand-icon {
      font-size: 0.52rem; color: var(--muted); margin-left: 6px;
      transition: transform 0.2s; flex-shrink: 0;
    }
    .trace-card.expanded .trace-expand-icon { transform: rotate(180deg); }

    .trace-card-body {
      padding: 10px 12px;
      display: block; /* start expanded */
    }
    .trace-card:not(.expanded) .trace-card-body { display: none; }
    .trace-content {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.78rem; color: #c8c8e0;
      white-space: pre-wrap; word-break: break-word;
      max-height: 240px; overflow-y: auto;
      line-height: 1.55;
    }
    .trace-meta {
      margin-top: 8px;

          </td>
          <td style="font-variant-numeric:tabular-nums;font-weight:600;color:${col}">${m.avg_score.toFixed(3)}</td>
          <td style="color:var(--muted)">${m.total}</td>
        </tr>`;
      }).join('');

      metricsSection.innerHTML = `
        <div class="section-header">Metrics Overview</div>
        <div class="metrics-card">
          <table class="metrics-table">
            <thead><tr>
              <th>Metric</th><th>Pass Rate</th><th>Avg Score</th><th>Tests</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // ── Trace type labels ────────────────────────────────────────────────────
    const TYPE_LABELS = {
      thought: 'THINK', tool_call: 'CALL', observation: 'RESULT', llm_call: 'LLM'
    };

    // ── Build trace tree ─────────────────────────────────────────────────────
    function buildTraceTree(trace, idxPrefix) {
      if (!trace || trace.length === 0) {
        return '<div class="no-data">No trace steps recorded.</div>';
      }
      const steps = trace.map((step, i) => {
        const typeClass = 'step-' + (step.type || 'default').replace(/[^a-z_]/g, '');
        const label = TYPE_LABELS[step.type] || (step.type ? step.type.toUpperCase() : 'STEP');
        const latencyStr = step.latency_ms != null ? fmtMs(step.latency_ms) : '';
        const contentPreview = step.content
          ? step.content.slice(0, 90) + (step.content.length > 90 ? '…' : '')
          : '';
        const metaEntries = step.metadata ? Object.entries(step.metadata) : [];
        const metaHtml = metaEntries.length > 0
          ? metaEntries.map(([k,v]) =>
              `<span class="trace-meta-kv"><span class="trace-meta-key">${escHtml(k)}:</span><span class="trace-meta-val">${escHtml(String(v))}</span></span>`
            ).join('')
          : '';
        const cardId = 'tc-' + idxPrefix + '-' + i;

        return `<div class="trace-step ${typeClass}">
          <div class="trace-dot"></div>
          <div class="trace-card expanded" id="${cardId}">
            <div class="trace-card-header" onclick="toggleTrace('${cardId}')">
              <span class="trace-step-num">#${i+1}</span>
              <span class="trace-type-badge">${label}</span>
              <span class="trace-preview-text">${escHtml(contentPreview)}</span>
              ${latencyStr ? `<span class="trace-latency">${latencyStr}</span>` : ''}
              <span class="trace-expand-icon">&#9660;</span>
            </div>
            <div class="trace-card-body">
              <div class="trace-content">${escHtml(step.content || '')}</div>
              ${metaHtml ? `<div class="trace-meta">${metaHtml}</div>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
      return `<div class="trace-tree">${steps}</div>`;
    }

    // ── Build tool calls ─────────────────────────────────────────────────────
    function buildToolCalls(toolCalls, idxPrefix) {
      if (!toolCalls || toolCalls.length === 0) {
        return '<div class="no-data">No tool calls recorded.</div>';
      }
      const cards = toolCalls.map((tc, i) => {
        const hasError = !!tc.error;
        const latencyStr = tc.latency_ms != null ? fmtMs(tc.latency_ms) : null;
        const argsJson = fmtJson(tc.arguments);
        const errorHtml = hasError
          ? `<div class="tool-section-label">Error</div><div class="tool-error">${escHtml(tc.error)}</div>`
          : '';
        const outputHtml = tc.output != null
          ? `<div class="tool-section-label" style="margin-top:10px">Output</div>
             <div class="tool-json">${escHtml(tc.output)}</div>`
          : '';
        const cardId = 'tcc-' + idxPrefix + '-' + i;
        return `<div class="tool-call-card ${hasError ? 'has-error' : ''}" id="${cardId}">
          <div class="tool-call-header" onclick="toggleToolCall('${cardId}')">
            <span class="tool-call-name">${escHtml(tc.name)}()</span>
            ${latencyStr ? `<span class="tool-call-latency">${latencyStr}</span>` : ''}
            ${hasError ? '<span class="badge badge-fail" style="margin-left:4px">error</span>' : ''}
            <span class="tool-call-expand">&#9660;</span>
          </div>
          <div class="tool-call-body">
            <div class="tool-section-label">Arguments</div>
            <div class="tool-json">${escHtml(argsJson)}</div>
            ${outputHtml}
            ${errorHtml}
          </div>
        </div>`;
      }).join('');
      return `<div class="tool-calls-list">${cards}</div>`;
    }

    // ── Build agent meta chips ────────────────────────────────────────────────
    function buildAgentMeta(result) {
      const chips = [];
      if (result.latency_ms != null) {
        chips.push(`<div class="agent-chip"><span class="agent-chip-label">Latency</span><span class="agent-chip-value">${fmtMs(result.latency_ms)}</span></div>`);
      }
      if (result.cost_usd != null) {
        chips.push(`<div class="agent-chip"><span class="agent-chip-label">Cost</span><span class="agent-chip-value">$${result.cost_usd.toFixed(5)}</span></div>`);
      }
      if (result.token_usage) {
        const t = result.token_usage;
        const parts = [];
        if (t.input  != null) parts.push('in: ' + t.input);
        if (t.output != null) parts.push('out: ' + t.output);
        if (parts.length)
          chips.push(`<div class="agent-chip"><span class="agent-chip-label">Tokens</span><span class="agent-chip-value">${parts.join(' / ')}</span></div>`);
      }
      if (result.trace && result.trace.length > 0) {
        chips.push(`<div class="agent-chip"><span class="agent-chip-label">Steps</span><span class="agent-chip-value">${result.trace.length}</span></div>`);
      }
      if (result.tool_calls && result.tool_calls.length > 0) {
        chips.push(`<div class="agent-chip"><span class="agent-chip-label">Tool Calls</span><span class="agent-chip-value">${result.tool_calls.length}</span></div>`);
      }
      if (result.expected_tools && result.expected_tools.length > 0) {
        chips.push(`<div class="agent-chip"><span class="agent-chip-label">Expected Tools</span><span class="agent-chip-value">${escHtml(result.expected_tools.join(', '))}</span></div>`);
      }
      return chips.length > 0 ? `<div class="agent-strip">${chips.join('')}</div>` : '';
    }

    // ── Render results ───────────────────────────────────────────────────────
    const tbody = document.getElementById('resultsBody');

    DATA.results.forEach((result, idx) => {
      const color = scoreColor(result.overall_score);
      const badge = result.passed
        ? '<span class="badge badge-pass">PASS</span>'
        : '<span class="badge badge-fail">FAIL</span>';
      const agentBadge = result.is_agent
        ? '<span class="badge badge-agent" style="margin-left:4px">AGENT</span>'
        : '';

      const pills = result.metrics.map(m => {
        const cls = m.passed ? 'mpill-pass' : 'mpill-fail';
        return `<span class="mpill ${cls}">${escHtml(m.name)}</span>`;
      }).join('');

      const nameText = result.name || ('Test #' + (idx + 1));
      const subText  = result.name ? result.input : '';

      // Data row
      const dataRow = document.createElement('tr');
      dataRow.className = 'data-row';
      dataRow.dataset.idx    = idx;
      dataRow.dataset.passed = result.passed ? '1' : '0';
      dataRow.dataset.name   = (result.name || result.input || '').toLowerCase();
      dataRow.innerHTML = `
        <td>${badge}${agentBadge}</td>
        <td>
          <div class="test-name">${escHtml(nameText)}</div>
          ${subText ? `<div class="test-sub">${escHtml(subText)}</div>` : ''}
        </td>
        <td>
          <div class="score-cell">
            <div class="score-track">
              <div class="score-fill" style="width:${result.overall_score*100}%;background:${color}"></div>
            </div>
            <span class="score-num" style="color:${color}">${result.overall_score.toFixed(3)}</span>
          </div>
        </td>
        <td><div class="metric-pills">${pills}</div></td>
        <td><div class="expand-btn">&#9660;</div></td>`;
      dataRow.onclick = () => toggleDetail(idx);
      tbody.appendChild(dataRow);

      // Build detail content
      const agentMetaHtml = result.is_agent ? buildAgentMeta(result) : '';
      const hasTrace = result.is_agent && result.trace && result.trace.length > 0;
      const hasTools = result.is_agent && result.tool_calls && result.tool_calls.length > 0;

      // Build tabs — for agents with trace, default to trace tab
      const defaultTab = (hasTrace) ? 'trace' : 'io';
      let tabs = `<div class="dtab ${defaultTab==='io'?'active':''}" onclick="switchTab(${idx},'io',this)">I/O</div>`;
      tabs += `<div class="dtab ${defaultTab==='metrics'?'active':''}" onclick="switchTab(${idx},'metrics',this)">Metrics</div>`;
      if (hasTrace) tabs += `<div class="dtab ${defaultTab==='trace'?'active':''}" onclick="switchTab(${idx},'trace',this)">Trace (${result.trace.length})</div>`;
      if (hasTools) tabs += `<div class="dtab" onclick="switchTab(${idx},'tools',this)">Tool Calls (${result.tool_calls.length})</div>`;

      // Metric breakdown rows
      const breakdownRows = result.metrics.map(m => {
        const c = scoreColor(m.score);
        const hasReason = !!m.reason;
        return `<div class="breakdown-row ${hasReason ? 'has-reason' : ''}">
          <span class="bd-name">${escHtml(m.name)}</span>
          <div class="bd-bar"><div class="bd-bar-fill" style="width:${m.score*100}%;background:${c}"></div></div>
          <span class="bd-score" style="color:${c}">${m.score.toFixed(3)}</span>
          ${m.passed
            ? '<span class="badge badge-pass" style="font-size:0.62rem;padding:2px 6px">PASS</span>'
            : '<span class="badge badge-fail" style="font-size:0.62rem;padding:2px 6px">FAIL</span>'}
          ${hasReason ? `<div class="bd-reason">${escHtml(m.reason)}</div>` : ''}
        </div>`;
      }).join('');

      const expectedBox = result.expected_output != null
        ? `<div class="io-box">
             <div class="io-label">Expected</div>
             <div class="io-content">${escHtml(result.expected_output)}</div>
           </div>`
        : '';

      // Detail row
      const detailRow = document.createElement('tr');
      detailRow.className = 'detail-row';
      detailRow.dataset.idx    = idx;
      detailRow.dataset.passed = result.passed ? '1' : '0';
      detailRow.dataset.name   = dataRow.dataset.name;
      detailRow.innerHTML = `
        <td colspan="5">
          <div class="detail-inner" id="detail-${idx}">
            ${agentMetaHtml}
            <div class="detail-tabs" id="tabs-${idx}">${tabs}</div>

            <!-- I/O Panel -->
            <div class="dtab-panel ${defaultTab==='io'?'active':''}" id="panel-${idx}-io">
              <div class="io-grid">
                <div class="io-box">
                  <div class="io-label">Input</div>
                  <div class="io-content ${result.input ? '' : 'io-empty'}">${result.input ? escHtml(result.input) : '(none)'}</div>
                </div>
                <div class="io-box">
                  <div class="io-label">Actual Output</div>
                  <div class="io-content ${result.actual_output ? '' : 'io-empty'}">${result.actual_output ? escHtml(result.actual_output) : '(none)'}</div>
                </div>
                ${expectedBox}
              </div>
            </div>

            <!-- Metrics Panel -->
            <div class="dtab-panel ${defaultTab==='metrics'?'active':''}" id="panel-${idx}-metrics">
              <div class="metric-breakdown">
                <div class="breakdown-header">Metric Breakdown</div>
                ${breakdownRows}
              </div>
            </div>

            <!-- Trace Panel -->
            ${hasTrace ? `<div class="dtab-panel ${defaultTab==='trace'?'active':''}" id="panel-${idx}-trace">${buildTraceTree(result.trace, idx)}</div>` : ''}

            <!-- Tool Calls Panel -->
            ${hasTools ? `<div class="dtab-panel" id="panel-${idx}-tools">${buildToolCalls(result.tool_calls, idx)}</div>` : ''}
          </div>
        </td>`;
      tbody.appendChild(detailRow);
    });

    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(idx, panelName, tabEl) {
      const detail = document.getElementById('detail-' + idx);
      detail.querySelectorAll('.dtab-panel').forEach(p => p.classList.remove('active'));
      detail.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
      const panel = document.getElementById('panel-' + idx + '-' + panelName);
      if (panel) panel.classList.add('active');
      if (tabEl) tabEl.classList.add('active');
    }

    // ── Row expand/collapse ───────────────────────────────────────────────────
    function toggleDetail(idx) {
      const inner   = document.getElementById('detail-' + idx);
      const dataRow = tbody.querySelector('.data-row[data-idx="' + idx + '"]');
      const isOpen  = inner.classList.contains('open');
      inner.classList.toggle('open', !isOpen);
      dataRow.classList.toggle('is-expanded', !isOpen);
    }

    // ── Trace card expand/collapse ────────────────────────────────────────────
    function toggleTrace(cardId) {
      const card = document.getElementById(cardId);
      if (card) card.classList.toggle('expanded');
    }

    // ── Tool call expand/collapse ─────────────────────────────────────────────
    function toggleToolCall(cardId) {
      const card = document.getElementById(cardId);
      if (card) card.classList.toggle('expanded');
    }

    // ── Filter & Search ───────────────────────────────────────────────────────
    function setFilter(f) {
      currentFilter = f;
      ['all','pass','fail'].forEach(id => {
        const btn = document.getElementById('btn-' + id);
        if (id === f) {
          btn.className = 'filter-btn' + (id === 'pass' ? ' active-pass' : id === 'fail' ? ' active-fail' : ' active');
        } else {
          btn.className = 'filter-btn';
        }
      });
      applyFilter();
    }

    function applyFilter() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      const dataRows   = tbody.querySelectorAll('.data-row');
      const detailRows = tbody.querySelectorAll('.detail-row');
      let visible = 0;

      dataRows.forEach((row, i) => {
        const isPassed = row.dataset.passed === '1';
        const name     = row.dataset.name || '';
        const matchFilter = currentFilter === 'all'
          || (currentFilter === 'pass' && isPassed)
          || (currentFilter === 'fail' && !isPassed);
        const matchSearch = !searchQuery || name.includes(searchQuery);
        const show = matchFilter && matchSearch;
        row.style.display = show ? '' : 'none';
        if (detailRows[i]) detailRows[i].style.display = show ? '' : 'none';
        if (show) visible++;
      });

      const total = dataRows.length;
      document.getElementById('filterCount').textContent =
        (currentFilter === 'all' && !searchQuery)
          ? total + ' tests'
          : visible + ' of ' + total + ' tests';
      document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
    }

    // Init
    applyFilter();
  </script>
</body>
</html>
